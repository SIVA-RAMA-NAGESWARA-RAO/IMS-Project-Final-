services:
  - type: web
    name: ims-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # ─── Automated Interview Reminders (every 30 min) ───────────────────────
  - type: cron
    name: ims-reminders
    env: node
    rootDir: backend
    buildCommand: npm install
    schedule: "*/30 * * * *"
    startCommand: npm run cron:reminders
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
